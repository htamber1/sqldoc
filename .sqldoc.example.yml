# sqldoc configuration — copy to .sqldoc.yml and edit.
#
# Every key here maps to the CLI option of the same name; an explicitly passed
# CLI flag always overrides the config value. Keys may use hyphens or
# underscores (no-ai == no_ai). .sqldoc.yml is gitignored because it can hold a
# password — prefer leaving the password out and passing it via --password or
# keeping secrets in .env.

# --- Connection (required, from here or the CLI) ---
server: localhost
database: AdventureWorks2022
username: sa
# password: SqlDoc123!        # better supplied on the CLI than committed to disk

# --- Output & AI preferences (all optional) ---
output: documentation.html
# format: html                # html / markdown / pdf / json (default: inferred
                              # from the output extension, else html)
mode: local                   # local (Ollama) or cloud (Anthropic)
# model: llama3.1:8b          # defaults per mode if omitted
# schemas: HumanResources,Sales   # comma-separated allowlist; omit for all
no_ai: false                  # true = schema-only, skip all LLM calls
concurrency: 8                # parallel AI calls during enrichment (1-64)
# include_definitions: false  # true = also send view/proc/trigger SQL bodies to
                              # the AI for richer descriptions. WIDENS the data
                              # boundary: in cloud mode the SQL is sent to Anthropic.
"yes": false                  # true = skip the cloud-mode confirmation prompt
                              # (quote the key: bare yes: is a YAML boolean)

# --- Custom PII patterns for `sqldoc scan` (optional) ---
# Define your own sensitive-column categories in addition to the built-in
# catalog. Checked before the built-ins, so org-specific patterns win.
# Patterns are regexes; use \b for short whole-word tokens (matched against a
# camelCase-tokenized name), otherwise a substring of the compact name.
# pii_patterns:
#   - category: "Employee ID"
#     patterns: ['\bempid\b', 'employeenumber']
#     severity: MEDIUM              # HIGH / MEDIUM / LOW
#     regulations: ["Internal Policy"]
#     action: "Restrict to HR systems; do not expose in analytics."
#     types: [varchar, nvarchar]    # optional; a matching type confirms
#   - category: "Customer Secret"
#     patterns: ['customersecret', 'apitoken']
#     severity: HIGH
#     regulations: ["Security"]
#     action: "Move to a secrets vault; never store in the database."

# --- Scan tuning for `sqldoc scan` (optional) ---
# confidence_threshold: 0.5   # drop findings below this score (0.0-1.0);
                              # 0.5 hides weak name-only / type-mismatch matches
# Known-safe columns to suppress (never sampled, reported, gated, or baselined).
# Each entry matches schema.table.column, table.column, a bare column name, or a
# glob — all case-insensitive.
# pii_allowlist:
#   - dbo.Config.ContactEmail       # this specific column is a support inbox, not PII
#   - "*.TestSSN"                    # any column named TestSSN
#   - dbo.Staging.*                  # everything in a staging table

# --- Multiple databases for `sqldoc comply --all-databases` (optional) ---
# The board-level cross-database access report audits every database listed here
# and shows each user/role and their read/write/admin access to regulated data
# side by side. Each entry: a name + a connection_string (or the discrete
# server/database/username/password) and an optional dialect.
# databases:
#   - name: Sales (SQL Server)
#     server: localhost
#     database: Sales
#     username: sa
#     password: "***"
#     dialect: sqlserver
#   - name: Analytics (Postgres)
#     connection_string: "postgresql://user:pw@warehouse:5432/analytics"
#     dialect: postgres
#   - name: HR (MySQL)
#     connection_string: "mysql://user:pw@hrhost:3306/hr"
#     dialect: mysql

# --- Background monitoring agent for `sqldoc agent` (optional) ---
# `sqldoc agent start` launches a persistent daemon that polls each database
# below, diffs the schema, re-documents only changed objects (reusing the AI
# cache), tracks health + PII trends, serves a live dashboard, and alerts on
# changes. State lives in ~/.sqldoc/agent.db.  Commands: start / stop / status /
# logs (-f to follow).
# agent:
#   interval_minutes: 30          # how often to poll each database
#   dashboard_port: 8080          # http://127.0.0.1:8080
#   mode: local                   # default AI mode for enrichment
#   no_ai: false                  # true = skip AI docs (schema-only monitoring)
#   concurrency: 8
#   # Server-level infrastructure monitoring (SQL Server only). When on, each
#   # poll also checks instance metrics + SQL Agent jobs, disk space, the
#   # ERRORLOG, and linked-server connectivity, and can alert on them.
#   server_monitoring: true
#   disk_threshold_percent: 10    # alert when a volume drops below this % free
#   errorlog_severity: 17         # alert on ERRORLOG entries at/above this severity
#   tempdb_version_store_mb: 2048 # alert when the tempdb version store exceeds this (SQL Server)
#   # Backup / point-in-time-recovery monitoring (SQL Server, PostgreSQL, MySQL).
#   backup_monitoring: true       # alert on stale/never-backed-up databases + PITR off
#   backup_max_age_hours: 24      # a database's last backup older than this is "stale"
#   # HA / replication monitoring (SQL Server AGs, PostgreSQL streaming, MySQL).
#   ha_monitoring: true           # alert when a replica is unhealthy or lagging
#   replica_lag_threshold_seconds: 30
#   databases:                    # monitor as many as you like, simultaneously
#     - name: prod-sqlserver
#       server: localhost
#       database: AdventureWorks2022
#       username: sa
#       password: "***"
#     - name: analytics-postgres
#       connection_string: "postgresql://user:pw@warehouse:5432/analytics"
#     - name: local-sqlite
#       connection_string: "./app.db"
#       no_ai: true
#   notifications:
#     slack_webhook: "https://hooks.slack.com/services/T00/B00/XXXX"
#     email:
#       smtp_host: smtp.example.com
#       smtp_port: 587
#       username: alerts@example.com
#       password: "***"
#       from: sqldoc@example.com
#       to: [dba@example.com]
#     # which events to send (server_monitoring adds the last four)
#     on: [schema_change, new_pii, health_degradation, job_failure, disk_low, errorlog_critical, linked_server_down, backup_stale, replica_lag, tempdb_version_store]
