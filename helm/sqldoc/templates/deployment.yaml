apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sqldoc.fullname" . }}
  labels:
    {{- include "sqldoc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate          # stateful agent store on a RWO volume
  selector:
    matchLabels:
      {{- include "sqldoc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sqldoc.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.config | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: sqldoc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["agent", "start", "--foreground"]
          ports:
            - name: dashboard
              containerPort: 8080
          env:
            - name: SQLDOC_AGENT_HOME
              value: /data
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if .Values.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/.sqldoc.yml
              subPath: .sqldoc.yml
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: config
          secret:
            secretName: {{ include "sqldoc.secretName" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "sqldoc.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
