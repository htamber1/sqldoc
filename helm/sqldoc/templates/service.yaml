apiVersion: v1
kind: Service
metadata:
  name: {{ include "sqldoc.fullname" . }}
  labels:
    {{- include "sqldoc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: dashboard
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "sqldoc.selectorLabels" . | nindent 4 }}
