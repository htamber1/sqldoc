[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "sqldoc"
version = "1.5.1"
description = "Multi-database documentation generator + PII/compliance scanner for SQL Server, PostgreSQL, MySQL and Azure SQL, with optional AI-written descriptions."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Harsh Tamboli" }]
keywords = ["sql-server", "postgresql", "mysql", "azure-sql", "documentation", "database", "schema", "er-diagram"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Environment :: Console",
    "Topic :: Database",
    "Topic :: Documentation",
]
dependencies = [
    "anthropic>=0.109",
    "click>=8.1",
    "Jinja2>=3.1",
    "pyodbc>=5.0",
    "python-dotenv>=1.0",
    "PyYAML>=6.0",
    "fpdf2>=2.8",
    "requests>=2.31",
]

[project.optional-dependencies]
# Database drivers are optional: SQL Server (pyodbc) is a core dependency; the
# postgres/mysql drivers install only when you target those engines.
postgres = ["psycopg2-binary>=2.9"]
mysql = ["mysql-connector-python>=8.0"]
all = ["psycopg2-binary>=2.9", "mysql-connector-python>=8.0"]
test = ["pytest>=8", "pypdf>=4"]

[project.urls]
Homepage = "https://github.com/htamber1/sqldoc"
Repository = "https://github.com/htamber1/sqldoc"

[project.scripts]
sqldoc = "sqldoc.cli:cli"

[tool.setuptools]
packages = ["sqldoc", "sqldoc.adapters"]

[tool.pytest.ini_options]
testpaths = ["tests"]
